<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Jogo do Impostor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
            display: flex;
            justify-content: center;
            padding: 30px;
        }
        .box {
            width: 100%;
            max-width: 700px;
            background: #1b1b1b;
            padding: 24px;
            border-radius: 18px;
        }
        input,
        button,
        select {
            padding: 10px 12px;
            border-radius: 10px;
            border: none;
            margin: 6px 0;
        }
        input,
        select {
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background: #4f46e5;
            color: #fff;
            cursor: pointer;
        }
        button:hover {
            background: #4338ca;
        }
        .player {
            display: flex;
            gap: 8px;
            margin: 6px 0;
        }
        .player input {
            flex: 1;
        }
        .card {
            margin-top: 20px;
            padding: 40px;
            border: 2px dashed #555;
            border-radius: 16px;
            text-align: center;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
        }
        .small {
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Jogo do Impostor</h1>
        <div id="players"></div>
        <button onclick="addPlayer()">Adicionar jogador</button>
        <label>Quantidade de impostores</label>
        <select id="impostors">
            <option>1</option>
            <option>2</option>
        </select>
        <button onclick="startGame()">Começar</button>
        <div id="game"></div>
    </div>
    <script>
        const fallback = ['abóbora', 'avião', 'janela', 'martelo', 'oceano', 'floresta', 'girafa', 'computador', 'teclado', 'cadeira', 'mesa', 'relógio', 'sapato', 'camisa', 'fogão', 'geladeira', 'livro', 'caneta', 'borracha', 'mochila', 'ponte', 'rio', 'montanha', 'deserto', 'chuva', 'tempestade', 'raio', 'nuvem', 'sol', 'lua', 'estrela', 'planeta', 'cometa', 'foguete', 'satélite', 'robô', 'motor', 'engrenagem', 'parafuso', 'pneu', 'bicicleta', 'carro', 'ônibus', 'trem', 'navio', 'âncora', 'vela', 'pirata', 'castelo', 'espada', 'escudo', 'dragão', 'feiticeiro', 'fantasma', 'vampiro', 'lobisomem', 'dinossauro', 'abelha', 'formiga', 'aranha', 'cobra', 'jacaré', 'golfinho', 'tubarão', 'polvo', 'pinguim', 'coruja', 'papagaio', 'banana', 'laranja', 'melancia', 'morango', 'uva', 'cenoura', 'batata', 'pipoca', 'pizza', 'queijo', 'café', 'chocolate', 'sorvete', 'hospital', 'médico', 'escola', 'professor', 'biblioteca', 'museu', 'teatro', 'violino', 'tambor', 'guitarra', 'microfone', 'telefone', 'câmera', 'espelho', 'sabão', 'toalha', 'travesseiro', 'cobertor', 'vela', 'lâmpada', 'tomada', 'internet', 'saturno', 'vulcão', 'ilha', 'labirinto', 'tesouro', 'helicóptero', 'submarino', 'ímã', 'bússola', 'ampulheta', 'capacete', 'elefante', 'leão', 'tigre', 'macaco', 'zebra', 'gato', 'cachorro', 'coelho', 'pato', 'galinha', 'cavalo', 'ovelha', 'porco', 'vaca', 'pavão', 'águia', 'foca', 'baleia', 'caranguejo', 'camarão', 'lagosta', 'esquilo', 'tartaruga', 'borboleta', 'joaninha', 'grilo', 'cigarra', 'lesma', 'minhoca', 'mosquito', 'rosa', 'margarida', 'girassol', 'orquídea', 'violeta', 'samambaia', 'cacto', 'pinheiro', 'bambu', 'carvalho', 'maçã', 'pera', 'abacaxi', 'manga', 'kiwi', 'limão', 'coco', 'maracujá', 'acerola', 'goiaba', 'tomate', 'alface', 'cebola', 'alho', 'milho', 'arroz', 'feijão', 'macarrão', 'pão', 'bolo', 'biscoito', 'torta', 'sanduíche', 'hambúrguer', 'pastel', 'coxinha', 'brigadeiro', 'pudim', 'gelatina', 'iogurte', 'prédio', 'casa', 'apartamento', 'quarto', 'cozinha', 'banheiro', 'garagem', 'jardim', 'escada', 'elevador', 'porta', 'chave', 'fechadura', 'cortina', 'tapete', 'sofá', 'poltrona', 'armário', 'prateleira', 'panela', 'prato', 'copo', 'garfo', 'faca', 'colher', 'xícara', 'bule', 'jarra', 'garrafa', 'fósforo', 'isqueiro', 'lanterna', 'pilha', 'bateria', 'controle', 'rádio', 'televisão', 'notebook', 'maleta', 'carteira', 'óculos', 'guarda-chuva', 'chapéu', 'boné', 'cachecol', 'luva', 'meia', 'sandália', 'tênis', 'chinelo', 'bota', 'cinto', 'gravata', 'blusa', 'saia', 'vestido', 'calça', 'pincel', 'tinta', 'quadro', 'moldura', 'estátua', 'vaso', 'porta-retrato', 'cinzeiro', 'ábaco', 'cd', 'dvd', 'disquete', 'clipe', 'grampo', 'alfinete', 'agulha', 'linha', 'tesoura', 'régua', 'caderno', 'lápis', 'lapiseira', 'apontador', 'grampeador', 'perfurador', 'cartolina', 'adesivo', 'carimbo', 'diário', 'bola', 'boneca', 'carrinho', 'pipa', 'peteca', 'dominó', 'baralho', 'xadrez', 'quebra-cabeça', 'corda', 'gangorra', 'escorregador', 'balanço', 'trampolim', 'piscina', 'praia', 'areia', 'concha', 'pedra', 'esponja', 'cabide', 'funil', 'ralador', 'espremedor', 'descascador', 'abridor', 'saca-rolhas', 'escumadeira'];

        let roles = [],
            index = 0;

        function addPlayer(name = '') {
            const div = document.createElement('div');
            div.className = 'player';
            div.innerHTML = `<input placeholder="Nome do jogador" value="${name}">`;
            document.getElementById('players').appendChild(div);
        }

        for (let i = 1; i <= 2; i++) addPlayer('Jogador ' + i);

        function getWord() {
            return fallback[Math.floor(Math.random() * fallback.length)];
        }

        function shuffle(a) {
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        async function startGame() {
            const names = [...document.querySelectorAll('#players input')].map(x => x.value.trim()).filter(Boolean);
            const impostorCount = +document.getElementById('impostors').value;

            if (names.length < 3) return alert('Coloca pelo menos 3 jogadores.');
            if (impostorCount >= names.length) return alert('Impostores demais.');

            const word = getWord();
            let bag = [...Array(impostorCount).fill('IMPOSTOR'), ...Array(names.length - impostorCount).fill(word)];
            shuffle(bag);
            roles = names.map((name, i) => ({ name, role: bag[i] }));
            index = 0;
            showCard();
        }

        function showCard() {
            const gameDiv = document.getElementById('game');
            if (index >= roles.length) {
                gameDiv.innerHTML = '<div class="card">Todos viram. Comecem.</div>';
                return;
            }
            const p = roles[index];
            gameDiv.innerHTML = `
                <div class="small">Passe o celular para:</div>
                <div class="card" onclick="revealCard()">
                    <div><b>${p.name}</b><br><span class="small">toque para revelar</span></div>
                </div>`;
        }

        function revealCard() {
            const p = roles[index];
            const text = p.role === 'IMPOSTOR' ? '🕵️ Você é o IMPOSTOR' : `📝 Palavra: ${p.role}`;
            document.getElementById('game').innerHTML = `
                <div class="card" onclick="nextCard()">
                    ${text}<br><span class="small">toque para continuar</span>
                </div>`;
        }

        function nextCard() {
            index++;
            showCard();
        }
    </script>
</body>
</html>
